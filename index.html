<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bus Fare Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Bus Fare Calculator</h1>

    <label for="distance">Enter Distance (km):</label>
    <input type="number" id="distance" placeholder="Enter distance">

    <label for="busType">Select Bus Type:</label>
    <select id="busType">
        <option value="normal">Normal Bus</option>
        <option value="ac">AC Bus</option>
        <option value="express">Express Bus</option>
    </select>

    <label>
        <input type="checkbox" id="studentDiscount">
        Apply Student Discount (20%)
    </label>

    <div class="buttons">
        <button onclick="calculateFare()">Calculate Fare</button>
        <button onclick="resetForm()">Reset</button>
    </div>

    <h2 id="result">Total Fare: ₹0</h2>

    <table>
        <tr>
            <th>Bus Type</th>
            <th>Base Fare</th>
            <th>Extra Per KM</th>
        </tr>
        <tr>
            <td>Normal</td>
            <td>₹10</td>
            <td>₹2</td>
        </tr>
        <tr>
            <td>AC</td>
            <td>₹20</td>
            <td>₹4</td>
        </tr>
        <tr>
            <td>Express</td>
            <td>₹15</td>
            <td>₹3</td>
        </tr>
    </table>
</div>

<script src="script.js"></script>
</body>
</html>
